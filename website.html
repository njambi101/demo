<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buttons and text
    </title>
    <style>
        .names {
            background-color: yellow;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .group {
            background-color: orange;
            color: black;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
       
    </style>
</head>
<body>
<button class="names">jane</button>
<button class="group">pizza</button>
<p>Hello world!</p>
<p>Welcome to my website.today i studied for my project.</p>
<script>
    alert("Welcome to my website!");
</script>
</body>
</html>
