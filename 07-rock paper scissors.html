<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07rock paper scissors</title> 
</head>
<body>
    <h3>rock paper scissors</h3>
    <button onclick="
   playgame('rock');"    
     >rock</button>
   
    <button onclick="
      playgame('paper');"

    >paper</button>
    
   

    <button onclick="    
    playgame('scissors');"
    >scissors </button>

    <button onclick="
        
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;  
        
    alert('score reset');
        
        ">reset</button>
        <p  class = 'js-score'></p>
    <script>
        const score = {
            wins: 0,
            losses: 0,
            ties: 0
        };
     

    function playgame(playerMove){
        
        const moves = playwithme();
            let persons = '';
        if (playerMove === 'rock'){
        
        if (moves === 'rock') {
            persons = ' tie';
        } else if (moves === 'paper') {
            persons = ' you loose';
        } else if (moves === 'scissors') {
            persons = ' your the sigma you win';

        }
    }else if (playerMove === 'paper') {
        if (moves === 'rock') {
            persons = ' your the sigma you win';
        } else if (moves === 'paper') {
            persons = ' tie';
        } else if (moves === 'scissors') {
            persons = ' you loose';

        }

    }else if (playerMove === 'scissors') {
        if (moves === 'rock') {
            persons = 'you loose';
        } else if (moves === 'paper') {
            persons = ' your the sigma you win';
        } else if (moves === 'scissors') {
            persons = ' tie';

        }
    }
    if (persons === ' your the sigma you win' ) {
        score.wins += 1;
    }else if (persons === ' you loose') {
        score.losses += 1;
    }else if (persons === ' tie') {
        score.ties += 1;
    }

  
 
    localStorage.setItem('score', JSON.stringify(score));
    answer = JSON.parse(localStorage.getItem('score'));
    document.querySelector('.js-score').textContent = `wins: ${answer.wins}, losses: ${answer.losses}, ties: ${answer.ties}`;

    
    alert(`you picked ${playerMove} and the computer picked ${moves}, ${persons} thankyou for playing😊
${score.wins} wins, ${score.losses} losses, ${score.ties} ties`)
 
    }

              
    function playwithme(){
            let moves = '';
              const choices = Math.random();
            if (choices >= 0 && choices < 1 / 3) {
                moves = 'paper';
            } else if (choices >= 1 / 3 && choices < 2 / 3) {
                moves = 'rock';
            } else if (choices >= 2 / 3 && choices < 1) {
                moves = 'scissors';
            };   

            return moves;
        }

    </script>
</body>
</html>
